<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#061018">
    <title>Void Velocity</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="playfield" aria-label="Void Velocity game">
        <canvas id="game" width="720" height="1080"></canvas>
        <div class="hud" aria-live="polite">
          <div class="metric">
            <span>Distance</span>
            <strong id="distance">0 m</strong>
          </div>
          <div class="metric">
            <span>Fuel</span>
            <strong id="fuel">100%</strong>
          </div>
          <div class="metric">
            <span>Hull</span>
            <strong id="hull">100%</strong>
          </div>
          <div class="metric">
            <span>Cargo</span>
            <strong id="cargo">0/8</strong>
          </div>
        </div>
        <div class="touch-lanes" aria-hidden="true">
          <button id="leftLane" type="button">Left</button>
          <button id="rightLane" type="button">Right</button>
        </div>
        <div class="action-bar">
          <button id="boostButton" class="primary" type="button">
            <span class="icon">>>></span>
            Boost
          </button>
          <button id="shieldButton" type="button">
            <span class="icon">[]</span>
            Shield
          </button>
        </div>
        <button id="helpButton" class="help-button" aria-label="How to play" type="button">?</button>
        <button id="pauseButton" class="pause-button" aria-label="Pause game" type="button">||</button>
        <div id="overlay" class="overlay">
          <div class="modal">
            <p class="eyebrow">Skill-based deep space runner</p>
            <h1 id="overlayTitle">Void Velocity</h1>
            <div id="overlayCopy" class="overlay-copy">Pilot the cargo vessel, dodge hazards, collect resources, and stretch every drop of fuel.</div>
            <div class="modal-actions">
              <button id="startButton" class="primary" type="button">Start Run</button>
              <button id="howToButton" type="button">How to Play</button>
            </div>
          </div>
        </div>
      </section>

      <aside class="control-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Commander Console</p>
            <h2 id="playerName">Guest Pilot</h2>
          </div>
          <div class="wallet">
            <span>Coins</span>
            <strong id="coins">0</strong>
          </div>
        </header>

        <nav class="tabs" aria-label="Game panels">
          <button class="tab active" data-panel="ship" type="button">Ship</button>
          <button class="tab" data-panel="missions" type="button">Missions</button>
          <button class="tab" data-panel="leaderboard" type="button">Ranks</button>
        </nav>

        <section id="shipPanel" class="panel-section active">
          <div class="stat-grid">
            <div>
              <span>Level</span>
              <strong id="level">1</strong>
            </div>
            <div>
              <span>XP</span>
              <strong id="xp">0</strong>
            </div>
            <div>
              <span>Best</span>
              <strong id="bestDistance">0 m</strong>
            </div>
            <div>
              <span>Materials</span>
              <strong id="materials">0</strong>
            </div>
          </div>
          <div id="upgrades" class="upgrade-list"></div>
        </section>

        <section id="missionsPanel" class="panel-section">
          <div id="missions" class="mission-list"></div>
          <div class="login-streak">
            <span>Login streak</span>
            <strong id="streak">1 day</strong>
          </div>
        </section>

        <section id="leaderboardPanel" class="panel-section">
          <ol id="leaderboard" class="leaderboard"></ol>
        </section>
      </aside>
    </main>
    <script src="src/main.js"></script>
  </body>
</html>
